services:
  - type: web
    name: prasad-voice-agent
    runtime: docker
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACEHUB_API_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: conversation-logs-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@karriprasad.ai
      - key: ADMIN_PASSWORD
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: REPORTS_DIR
        value: /tmp/reports
      # Optional SMTP for email notifications (leave blank to disable)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@karriprasad.ai

databases:
  - name: conversation-logs-db
    plan: free
